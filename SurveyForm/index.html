<!DOCTYPE html>
<html lang ='en'>
<head>
  <meta charset ="utf-8">
  <title>Survey Form</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <h1 id ="title">Survey Form</h1>
  <p id ="description">Kindly fill up this survey form. Thank You!</p>

  <form id="survey-form">
    
    <label type="text" id ="name-label" required>Name</label>
    <input type ="text" id ="name" placeholder="Enter your name" required></input>

    <label type ="email" id ="email-label" required>Email</label>
    <input type ="email" id = "email" placeholder="Email" required></input>

    <label type ="number" id ="number-label" min="1" max="120" required>Age</label>
    <input type="number" id="number" min="1" max="120" placeholder="Enter your age" required></input>

<p>Civil Status</p>
<select id="dropdown">
    <option value="" disabled selected>Enter your Civil Status</option>
    <option value="option1">Married</option>
    <option value="option2">Single</option>
  </select>

  <p>Gender:</p>
  <label><input type="radio" value="yes" name="prefer">Male</label>
  <label><input type="radio" value="no" name="prefer">Female</label>
  <p></p>

  <p>Do you have any medical history?</p>
  <label><input type="checkbox" value="Male" name="medical-history">Yes</label>
  <label><input type="checkbox" value="Female" name="medical-history">No</label>
  
  <p>Any comments or Suggestions to improve this survey?</p>
  <textarea id="comments" name="comments" rows="4" cols="40" placeholder="Enter your comment here..."></textarea>
  <input id ="submit" type ="submit"></input>
</form>
</body>
